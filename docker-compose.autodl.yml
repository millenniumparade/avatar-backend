services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - .env.autodl
    environment:
      ALGORITHM_MODE: mock
      RUN_MIGRATIONS: "1"
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
      - minio

  worker:
    build:
      context: .
      dockerfile: Dockerfile.gpu
      args:
        BASE_IMAGE: ${GPU_BASE_IMAGE:-pytorch/pytorch:2.5.1-cuda12.4-cudnn9-runtime}
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=info -Q avatar_gpu --concurrency=${WORKER_CONCURRENCY:-1} --prefetch-multiplier=1 --max-tasks-per-child=20
    env_file:
      - .env.autodl
    environment:
      ALGORITHM_MODE: faceverse_v4
      FACEVERSE_V4_DEVICE: auto
      FACEVERSE_V4_ALLOW_CPU_FALLBACK: "false"
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    gpus: all
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
      - minio

  system-worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=info -Q avatar_default --concurrency=1 --prefetch-multiplier=1 --max-tasks-per-child=100
    env_file:
      - .env.autodl
    environment:
      ALGORITHM_MODE: mock
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
      - minio

  watchdog:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A app.workers.celery_app.celery_app beat --loglevel=info
    env_file:
      - .env.autodl
    environment:
      ALGORITHM_MODE: mock
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
      - minio

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-avatar}
      POSTGRES_USER: ${POSTGRES_USER:-avatar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-avatar}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-avatar_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-avatar_minio_secret}
    volumes:
      - minio_data:/data
    restart: unless-stopped

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-avatar_minio} ${MINIO_ROOT_PASSWORD:-avatar_minio_secret} &&
      mc mb --ignore-existing local/${S3_BUCKET_NAME:-avatar}
      "

volumes:
  postgres_data:
  minio_data:
