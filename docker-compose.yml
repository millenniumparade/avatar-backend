services:
  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - .env.example
    environment:
      RUN_MIGRATIONS: "1"
    volumes:
      - .:/app
    depends_on:
      - postgres
      - redis
      - minio

  worker:
    build: .
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=info -Q avatar_gpu --concurrency=4 --prefetch-multiplier=1 --max-tasks-per-child=20
    env_file:
      - .env.example
    volumes:
      - .:/app
    depends_on:
      - postgres
      - redis
      - minio

  system-worker:
    build: .
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=info -Q avatar_default --concurrency=1 --prefetch-multiplier=1 --max-tasks-per-child=100
    env_file:
      - .env.example
    volumes:
      - .:/app
    depends_on:
      - postgres
      - redis
      - minio

  watchdog:
    build: .
    command: celery -A app.workers.celery_app.celery_app beat --loglevel=info
    env_file:
      - .env.example
    volumes:
      - .:/app
    depends_on:
      - postgres
      - redis
      - minio

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: avatar
      POSTGRES_USER: avatar
      POSTGRES_PASSWORD: avatar
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: avatar_minio
      MINIO_ROOT_PASSWORD: avatar_minio_secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 avatar_minio avatar_minio_secret &&
      mc mb --ignore-existing local/avatar
      "

volumes:
  postgres_data:
  minio_data:
